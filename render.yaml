services:
  # ── FastAPI backend ────────────────────────────────────────────────────────
  - type: web
    name: journal-api
    runtime: python
    plan: free
    buildCommand: >
      pip install torch --index-url https://download.pytorch.org/whl/cpu &&
      pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false          # set in Render dashboard
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  # ── Streamlit frontend ─────────────────────────────────────────────────────
  - type: web
    name: journal-app
    runtime: python
    plan: free
    buildCommand: >
      pip install torch --index-url https://download.pytorch.org/whl/cpu &&
      pip install -r requirements.txt
    startCommand: >
      streamlit run app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true
    envVars:
      - key: API_BASE_URL
        fromService:
          name: journal-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: ANTHROPIC_API_KEY
        sync: false
